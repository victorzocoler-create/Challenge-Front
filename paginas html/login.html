<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Care Plus</title>
  <link rel="stylesheet" href="../paginas css/login.css">
</head>
<body>

<div class="container">

  <div class="left">
    <h1>
      <span>FAÇA SEU LOGIN</span>
      <span>CARE PLUS</span>
    </h1>

    <div class="card">
      <img src="../imagens/logo-branca.png" alt="Care Plus">

      <label>Email:</label>
      <input type="email" placeholder="Digite seu email">

      <label>Senha:</label>
      <input type="password" placeholder="Digite sua senha">

      <a href="#" class="esqueceu">Esqueceu sua senha?</a>

      <div class="captcha">
        <input type="checkbox">
        <span>I'm not a robot</span>
      </div>

      <a href="../paginas html/pagina_principal.html" class="login">LOGIN</a>
    </div>
  </div>

  <div class="right">
    <img src="../imagens/logo.png" alt="Care Plus">
  </div>

</div>

</body>
</html>

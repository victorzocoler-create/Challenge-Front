<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../paginas css/conta.css">
    <title>Care Plus - Conta</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../Imagens/logo.png" alt="Care Plus">
        </div>

        <nav>
            <a href="pagina_principal.html">Home</a>
            <a href="agenda.html">Agenda</a>
            <a href="missoes.html">Missões</a>
            <a href="pontos.html">Pontos</a>
            <a href="jogos.html">Jogos</a>
            <a href="conta.html">Conta</a>
        </nav>

        <div class="avatar"></div>
    </header>
    <div class="container-conta">

    <!-- FORM -->
    <div class="formulario">
        <h1>CONTA</h1>

        <label>Nome:</label>
        <input type="text" placeholder="Aldair José Carvalho">

        <label>Email:</label>
        <input type="email" placeholder="aldair123@gmail.com">

        <label>Telefone:</label>
        <input type="text" placeholder="(11) 993224567">

        <label>Cidade:</label>
        <input type="text" placeholder="Jacareí - SP">

        <label>Senha:</label>
        <input type="password" placeholder="********">

        <label>Plano:</label>
        <input type="text" placeholder="Básico">
        <label>Veja outras opções de Plano</label>
    </div>

    <!-- LADO DIREITO -->
   <div class="lado-direito"></div>

    <!-- ESQUERDA (NÍVEL) -->
    <div class="nivel">
        <h2>NÍVEL</h2>

        <div class="nivel-container">
            <div class="labels">
                <span>MESTRE →</span>
                <span>GUARDIÃO →</span>
                <span>RECRUTA →</span>
            </div>

            <div class="barra"></div>
        </div>

        <!-- DIREITA -->
        <div class="perfil">
            <img src="../Imagens/perfil.jpg" class="foto">
            <div class="card-nivel">
                <p><strong>Nível 1: Recruta</strong></p>
                <p>Pontos: 0 - 15.000 pts</p>
                <p>Benefício: 5% de desconto...</p>
            </div>
        </div>

    </div>

    <div class="sair">
        <img src="../Imagens/sair.png" alt="Sair">
        <span>SAIR</span>
    </div>
        

    
</body>
</html>
